<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover" />
  <title>ChatJump - WhatsApp</title>
  <link rel="stylesheet" href="../../libs/css/uspi.css" />
  <style>
    .cj-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid #4a4a4a; background: #2d2d2d; color: #eee; cursor: pointer; }
    .cj-btn:hover { background: #3a3a3a; }
    .cj-file { font-size: 11px; opacity: 0.7; margin-top: 4px; word-break: break-all; }
    .cj-note { font-size: 11px; opacity: 0.7; line-height: 1.4; }
    .cj-evo { margin-top: 14px; border-top: 1px solid #3a3a3a; padding-top: 10px; }
    .cj-evo-title { font-size: 12px; opacity: 0.85; margin-bottom: 6px; }
    .cj-evo label { display: block; font-size: 11px; opacity: 0.7; margin: 6px 0 2px; }
    .cj-evo input[type=text], .cj-evo input[type=password] { width: 100%; box-sizing: border-box; padding: 5px 8px; background: #1b1b1b; color: #eee; border: 1px solid #3a3a3a; border-radius: 4px; font-size: 12px; }
    .cj-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .cj-status { font-size: 11px; opacity: 0.9; }
    #evo-results { max-height: 180px; overflow: auto; border: 1px solid #3a3a3a; border-radius: 4px; margin-top: 8px; display: none; }
    .cj-contact { padding: 6px 8px; cursor: pointer; border-bottom: 1px solid #2a2a2a; font-size: 12px; display: flex; justify-content: space-between; gap: 8px; }
    .cj-contact:hover { background: #2d2d2d; }
    .cj-contact .num { opacity: 0.6; font-size: 11px; }
    .cj-hidden { display: none; }
  </style>
</head>
<body>
  <div class="uspi-wrapper hidden">
    <form id="property-inspector">
      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Contact name</div>
        <input class="uspi-item-value" type="text" name="contactName" placeholder="Jane Doe" />
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Phone number</div>
        <input class="uspi-item-value" type="text" name="phone" placeholder="+1 555 123 4567" />
      </div>

      <div class="uspi-item">
        <div class="uspi-item-label" data-localize>Contact photo</div>
        <div class="uspi-item-value">
          <button type="button" id="pickPhoto" class="cj-btn" data-localize>Choose image...</button>
          <input type="hidden" name="iconPath" />
          <div id="photoPath" class="cj-file"></div>
        </div>
      </div>

      <div class="uspi-item">
        <div class="cj-note" data-localize>Enter the number in international format (with country code). WhatsApp Desktop or WhatsApp must be installed.</div>
      </div>
    </form>

    <div class="cj-evo">
      <div class="cj-evo-title" data-localize>Import from WhatsApp (Evolution API)</div>
      <label data-localize>Server URL</label>
      <input type="text" id="evo-server" placeholder="https://evolution.example.com" />
      <label data-localize>API Key</label>
      <input type="password" id="evo-key" placeholder="********" />
      <label data-localize>Instance</label>
      <input type="text" id="evo-instance" placeholder="my-instance" />
      <div class="cj-row">
        <button type="button" id="evo-test" class="cj-btn" data-localize>Test connection</button>
        <button type="button" id="evo-import" class="cj-btn" data-localize>Import contact</button>
        <span id="evo-status" class="cj-status"></span>
      </div>
      <input type="text" id="evo-search" class="cj-hidden" style="margin-top:8px;" />
      <div id="evo-results"></div>
    </div>
  </div>

  <script src="../../libs/js/constants.js"></script>
  <script src="../../libs/js/eventEmitter.js"></script>
  <script src="../../libs/js/timers.js"></script>
  <script src="../../libs/js/utils.js"></script>
  <script src="../../libs/js/ulanziApi.js"></script>

  <script src="./inspector.js"></script>
</body>
</html>
